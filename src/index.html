<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>DP-100 Controller</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: sans-serif;
                background: #1e1e1e;
                color: #e0e0e0;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* ステータスバー */
            #statusbar {
                background: #2d2d2d;
                padding: 6px 12px;
                display: flex;
                align-items: center;
                gap: 12px;
                border-bottom: 1px solid #444;
                font-size: 13px;
            }

            #connect-btn {
                padding: 4px 12px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                background: #4caf50;
                color: white;
                font-size: 12px;
            }

            #connect-btn.disconnected {
                background: #f44336;
            }
            #device-name {
                color: #aaa;
            }

            /* メインレイアウト */
            #main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            /* 左パネル: プロファイル */
            #left-panel {
                width: 160px;
                background: #252525;
                border-right: 1px solid #444;
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            #left-panel h3 {
                font-size: 12px;
                color: #aaa;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .profile-btn {
                padding: 8px;
                background: #333;
                border: 1px solid #555;
                border-radius: 4px;
                color: #e0e0e0;
                cursor: pointer;
                text-align: left;
                font-size: 13px;
            }

            .profile-btn.active {
                background: #1565c0;
                border-color: #1976d2;
            }

            /* 右パネル */
            #right-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 12px;
                gap: 12px;
                overflow: hidden;
            }

            /* メーター表示 */
            #meters {
                display: flex;
                gap: 12px;
            }

            .meter {
                flex: 1;
                background: #252525;
                border: 1px solid #444;
                border-radius: 8px;
                padding: 12px;
                text-align: center;
            }

            .meter .label {
                font-size: 11px;
                color: #aaa;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .meter .value {
                font-size: 32px;
                font-weight: bold;
                font-family: monospace;
                color: #4fc3f7;
                margin: 4px 0;
            }

            .meter .unit {
                font-size: 12px;
                color: #aaa;
            }

            /* 中段: Profile設定 + Output Control */
            #control-area {
                display: flex;
                gap: 12px;
            }

            /* Profile設定パネル */
            #profile-settings {
                flex: 1;
                background: #252525;
                border: 1px solid #444;
                border-radius: 8px;
                padding: 12px;
            }

            #profile-settings h3 {
                font-size: 12px;
                color: #aaa;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 8px;
            }

            .settings-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .setting-row {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .setting-row label {
                font-size: 12px;
                color: #aaa;
                width: 50px;
            }

            .setting-row input {
                flex: 1;
                background: #333;
                border: 1px solid #555;
                border-radius: 4px;
                color: #e0e0e0;
                padding: 4px 8px;
                font-size: 14px;
            }

            .setting-row input:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .setting-row .unit {
                font-size: 12px;
                color: #aaa;
                width: 20px;
            }

            #apply-btn {
                grid-column: 1 / -1;
                padding: 8px;
                font-size: 14px;
                font-weight: bold;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                background: #1565c0;
                color: white;
                margin-top: 4px;
            }

            #apply-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            /* Output Controlパネル */
            #output-control {
                width: 220px;
                background: #252525;
                border: 1px solid #444;
                border-radius: 8px;
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            #output-control h3 {
                font-size: 12px;
                color: #aaa;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            #output-control .setting-row input {
                font-size: 16px;
            }

            #output-btn {
                padding: 12px;
                font-size: 18px;
                font-weight: bold;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                background: #4caf50;
                color: white;
                letter-spacing: 2px;
                margin-top: 4px;
            }

            #output-btn.off {
                background: #555;
                color: #aaa;
            }

            #output-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            /* グラフ */
            #chart-area {
                flex: 1;
                background: #252525;
                border: 1px solid #444;
                border-radius: 8px;
                padding: 12px;
                min-height: 0;
            }

            #chart-area canvas {
                width: 100% !important;
                height: 100% !important;
            }
        </style>
    </head>
    <body>
        <!-- ステータスバー -->
        <div id="statusbar">
            <button id="connect-btn" class="disconnected">接続</button>
            <span id="device-name">未接続</span>
        </div>

        <!-- メインレイアウト -->
        <div id="main">
            <!-- 左: プロファイル選択 -->
            <div id="left-panel">
                <h3>プロファイル</h3>
                <div id="profile-list"></div>
            </div>

            <!-- 右 -->
            <div id="right-panel">
                <!-- メーター -->
                <div id="meters">
                    <div class="meter">
                        <div class="label">Vin</div>
                        <div class="value" id="vin">--.-</div>
                        <div class="unit">V</div>
                    </div>
                    <div class="meter">
                        <div class="label">Vout</div>
                        <div class="value" id="vout">--.-</div>
                        <div class="unit">V</div>
                    </div>
                    <div class="meter">
                        <div class="label">Iout</div>
                        <div class="value" id="iout">-.---</div>
                        <div class="unit">A</div>
                    </div>
                    <div class="meter">
                        <div class="label">Power</div>
                        <div class="value" id="power">--.-</div>
                        <div class="unit">W</div>
                    </div>
                    <div class="meter">
                        <div class="label">Temp</div>
                        <div class="value" id="temp">--.-</div>
                        <div class="unit">℃</div>
                    </div>
                </div>

                <!-- 中段: Profile設定 + Output Control -->
                <div id="control-area">
                    <!-- Profile設定（保存用） -->
                    <div id="profile-settings">
                        <h3>Profile 設定（保存）</h3>
                        <div class="settings-grid">
                            <div class="setting-row">
                                <label>Vset</label>
                                <input
                                    type="number"
                                    id="vset"
                                    step="0.01"
                                    min="0"
                                    max="30"
                                    value="5.00"
                                />
                                <span class="unit">V</span>
                            </div>
                            <div class="setting-row">
                                <label>Iset</label>
                                <input
                                    type="number"
                                    id="iset"
                                    step="0.001"
                                    min="0"
                                    max="5"
                                    value="1.000"
                                />
                                <span class="unit">A</span>
                            </div>
                            <div class="setting-row">
                                <label>OVP</label>
                                <input
                                    type="number"
                                    id="ovp"
                                    step="0.01"
                                    min="0"
                                    max="33"
                                    value="33.00"
                                />
                                <span class="unit">V</span>
                            </div>
                            <div class="setting-row">
                                <label>OCP</label>
                                <input
                                    type="number"
                                    id="ocp"
                                    step="0.001"
                                    min="0"
                                    max="5.5"
                                    value="5.500"
                                />
                                <span class="unit">A</span>
                            </div>
                            <button id="apply-btn">Apply</button>
                        </div>
                    </div>

                    <!-- Output Control（即時変更） -->
                    <div id="output-control">
                        <h3>Output Control</h3>
                        <div class="setting-row">
                            <label>V</label>
                            <input
                                type="number"
                                id="out-v"
                                step="0.01"
                                min="0"
                                max="30"
                                value="5.00"
                            />
                            <span class="unit">V</span>
                        </div>
                        <div class="setting-row">
                            <label>A</label>
                            <input
                                type="number"
                                id="out-a"
                                step="0.001"
                                min="0"
                                max="5"
                                value="1.000"
                            />
                            <span class="unit">A</span>
                        </div>
                        <button id="output-btn" class="off">OUTPUT OFF</button>
                    </div>
                </div>

                <!-- グラフ -->
                <div id="chart-area">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <script src="chart.js"></script>
        <script>
            const { invoke } = window.__TAURI__.core;

            let profiles = Array(10).fill(null);
            let connected = false;
            let pollTimer = null;
            let outputOn = false;
            let activeOutputIndex = 0;

            // プロファイルボタン生成
            const profileList = document.getElementById("profile-list");
            for (let i = 0; i < 10; i++) {
                const btn = document.createElement("button");
                btn.className = "profile-btn" + (i === 0 ? " active" : "");
                btn.textContent = "Profile " + i;
                btn.dataset.index = i;
                btn.addEventListener("click", () => {
                    if (!connected) return;
                    if (outputOn) return;
                    document
                        .querySelectorAll(".profile-btn")
                        .forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    if (profiles[i]) showProfile(profiles[i]);
                });
                profileList.appendChild(btn);
            }

            function activeProfileIndex() {
                const btn = document.querySelector(".profile-btn.active");
                return btn ? parseInt(btn.dataset.index) : 0;
            }

            // Profile設定をUIに反映
            function showProfile(p) {
                document.getElementById("vset").value = p.vset.toFixed(2);
                document.getElementById("iset").value = p.iset.toFixed(3);
                document.getElementById("ovp").value = p.ovp.toFixed(2);
                document.getElementById("ocp").value = p.ocp.toFixed(3);
                // OUTPUT OFF中のみOutput Controlも更新
                if (!outputOn) {
                    document.getElementById("out-v").value = p.vset.toFixed(2);
                    document.getElementById("out-a").value = p.iset.toFixed(3);
                }
            }
            // Applyボタン: プロファイルに保存
            document
                .getElementById("apply-btn")
                .addEventListener("click", async () => {
                    if (!connected) return;
                    const idx = activeProfileIndex();
                    const p = {
                        index: idx,
                        output_on: outputOn,
                        vset: parseFloat(document.getElementById("vset").value),
                        iset: parseFloat(document.getElementById("iset").value),
                        ovp: parseFloat(document.getElementById("ovp").value),
                        ocp: parseFloat(document.getElementById("ocp").value),
                    };
                    try {
                        await invoke("set_profile", { profile: p });
                        profiles[idx] = p;
                        // Output Controlにも反映
                        document.getElementById("out-v").value =
                            p.vset.toFixed(2);
                        document.getElementById("out-a").value =
                            p.iset.toFixed(3);
                    } catch (e) {
                        console.error("set_profile error:", e);
                    }
                });

            // OUTPUTボタン
            const outputBtn = document.getElementById("output-btn");
            outputBtn.addEventListener("click", async () => {
                if (!connected) return;
                const newState = !outputOn;
                const vset = parseFloat(document.getElementById("out-v").value);
                const iset = parseFloat(document.getElementById("out-a").value);
                const idx = activeProfileIndex();
                const p = profiles[idx];
                const ovp = p ? p.ovp : 33.0;
                const ocp = p ? p.ocp : 5.5;
                try {
                    if (newState) {
                        activeOutputIndex = idx;
                        await invoke("set_output_immediate", {
                            index: activeOutputIndex,
                            on: true,
                            vset,
                            iset,
                            ovp,
                            ocp,
                        });
                    } else {
                        await invoke("set_output_immediate", {
                            index: activeOutputIndex,
                            on: false,
                            vset,
                            iset,
                            ovp,
                            ocp,
                        });
                    }
                    outputOn = newState;
                    updateOutputBtn();
                } catch (e) {
                    console.error("set_output error:", e);
                }
            });

            function updateOutputBtn() {
                outputBtn.textContent = outputOn ? "OUTPUT ON" : "OUTPUT OFF";
                outputBtn.classList.toggle("off", !outputOn);
                updateUI();
            }

            // Output Control: 値変更時に即時反映
            ["out-v", "out-a"].forEach((id) => {
                document
                    .getElementById(id)
                    .addEventListener("change", async () => {
                        if (!connected || !outputOn) return;
                        const vset = parseFloat(
                            document.getElementById("out-v").value,
                        );
                        const iset = parseFloat(
                            document.getElementById("out-a").value,
                        );
                        const idx = activeProfileIndex();
                        const p = profiles[idx];
                        const ovp = p ? p.ovp : 33.0;
                        const ocp = p ? p.ocp : 5.5;
                        try {
                            await invoke("set_output_immediate", {
                                index: activeOutputIndex,
                                on: true,
                                vset,
                                iset,
                                ovp,
                                ocp,
                            });
                        } catch (e) {
                            console.error("set_output_immediate error:", e);
                        }
                    });
            });

            // UI状態更新
            function updateUI() {
                const profileSettingInputs = ["vset", "iset", "ovp", "ocp"];
                document.getElementById("apply-btn").disabled = !connected;
                profileSettingInputs.forEach((id) => {
                    document.getElementById(id).disabled = !connected;
                });
                outputBtn.disabled = !connected;
                document.getElementById("out-v").disabled = !connected;
                document.getElementById("out-a").disabled = !connected;
                document.querySelectorAll(".profile-btn").forEach((b) => {
                    b.style.opacity = connected && outputOn ? "0.4" : "1.0";
                });
            }

            // Chart.js
            const MAX_POINTS = 60;
            const labels = Array(MAX_POINTS).fill("");
            const voutData = Array(MAX_POINTS).fill(null);
            const ioutData = Array(MAX_POINTS).fill(null);

            const chart = new Chart(document.getElementById("chart"), {
                type: "line",
                data: {
                    labels,
                    datasets: [
                        {
                            label: "Vout (V)",
                            data: voutData,
                            borderColor: "#4fc3f7",
                            borderWidth: 1.5,
                            pointRadius: 0,
                            yAxisID: "yV",
                        },
                        {
                            label: "Iout (A)",
                            data: ioutData,
                            borderColor: "#ef9a9a",
                            borderWidth: 1.5,
                            pointRadius: 0,
                            yAxisID: "yI",
                        },
                    ],
                },
                options: {
                    animation: false,
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        yV: {
                            position: "left",
                            ticks: { color: "#4fc3f7" },
                            grid: { color: "#333" },
                        },
                        yI: {
                            position: "right",
                            ticks: { color: "#ef9a9a" },
                            grid: { drawOnChartArea: false },
                        },
                    },
                    plugins: {
                        legend: { labels: { color: "#e0e0e0" } },
                    },
                },
            });

            function updateMeters(info) {
                document.getElementById("vin").textContent =
                    info.vin.toFixed(2);
                document.getElementById("vout").textContent =
                    info.vout.toFixed(2);
                document.getElementById("iout").textContent =
                    info.iout.toFixed(3);
                document.getElementById("power").textContent = (
                    info.vout * info.iout
                ).toFixed(2);
                document.getElementById("temp").textContent =
                    info.temp.toFixed(1);

                voutData.push(info.vout);
                voutData.shift();
                ioutData.push(info.iout);
                ioutData.shift();
                chart.update();
            }

            async function poll() {
                try {
                    const info = await invoke("get_basic_info");
                    updateMeters(info);
                } catch (e) {
                    console.error("poll error:", e);
                    disconnect();
                }
            }

            function disconnect() {
                connected = false;
                if (pollTimer) clearInterval(pollTimer);
                pollTimer = null;
                profiles = Array(10).fill(null);
                connectBtn.textContent = "接続";
                connectBtn.classList.add("disconnected");
                document.getElementById("device-name").textContent = "未接続";
                updateUI();
            }

            const connectBtn = document.getElementById("connect-btn");
            connectBtn.addEventListener("click", async () => {
                if (connected) {
                    disconnect();
                    return;
                }
                try {
                    const name = await invoke("get_device_info");
                    profiles = await invoke("get_all_profiles");
                    connected = true;
                    connectBtn.textContent = "切断";
                    connectBtn.classList.remove("disconnected");
                    document.getElementById("device-name").textContent = name;

                    // 選択中のプロファイルを表示
                    showProfile(profiles[activeProfileIndex()]);

                    // Output Controlの初期値をProfile0から設定
                    const p = profiles[0];
                    document.getElementById("out-v").value = p.vset.toFixed(2);
                    document.getElementById("out-a").value = p.iset.toFixed(3);

                    // 初期OUTPUT状態取得
                    const initialInfo = await invoke("get_basic_info");
                    outputOn = initialInfo.output_on;
                    activeOutputIndex = activeProfileIndex();
                    updateOutputBtn();

                    pollTimer = setInterval(poll, 500);
                    updateUI();
                } catch (e) {
                    document.getElementById("device-name").textContent =
                        "接続失敗: " + e;
                }
            });

            updateUI();
        </script>
    </body>
</html>
